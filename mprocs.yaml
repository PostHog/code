procs:
  code:
    cmd: ["node", "scripts/pnpm-run.mjs", "--filter", "code", "run", "start"]
    cwd: .
    color: blue
    depends_on:
      - agent
      - git

  agent:
    cmd: ["node", "scripts/pnpm-run.mjs", "--filter", "agent", "run", "dev"]
    cwd: .
    color: magenta

  git:
    cmd: ["node", "scripts/pnpm-run.mjs", "--filter", "@posthog/git", "run", "dev"]
    cwd: .
    color: yellow

  storybook:
    cmd: ["node", "scripts/pnpm-run.mjs", "--filter", "code", "run", "storybook"]
    cwd: .
    color: cyan
    autostart: false

  mobile-ios:
    cmd: ["node", "scripts/pnpm-run.mjs", "--filter", "@posthog/mobile", "run", "ios"]
    cwd: .
    color: green
    autostart: false
